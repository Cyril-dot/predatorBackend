spring.application.name=subscription-platform
server.port=8080

# ==============================
# Paystack configuration
# ==============================
# Get these from https://dashboard.paystack.com/#/settings/developer
paystack.secret-key=sk_test_replace_with_your_secret_key
paystack.public-key=pk_test_replace_with_your_public_key
paystack.base-url=https://api.paystack.co
# Where Paystack should redirect the user after payment (your frontend page)
paystack.callback-url=http://localhost:3000/payment/callback

# ==============================
# Subscription plans (cedis / hours)
# ==============================
plan.two-hour.amount=200
plan.two-hour.hours=2
plan.three-hour.amount=350
plan.three-hour.hours=3
plan.five-hour.amount=500
plan.five-hour.hours=5

# ==============================
# Session / scheduler
# ==============================
# How often (ms) the background job scans for expired sessions and force logs-out users
session.cleanup.interval-ms=30000

# Generated password length
account.password.length=10

# ==============================
# Admin / Super Admin
# ==============================
# How long an admin-panel login session lasts before needing to log in again
admin.session.duration-hours=12

# Default referral commission split when a super admin creates an admin
# without specifying adminSharePercent explicitly (admin gets 30%, platform 70%)
referral.default-admin-share-percent=30
referral.default-platform-share-percent=70

# Bootstrap super admin - created automatically on first startup if it
# doesn't already exist. CHANGE THESE before deploying anywhere real.
superadmin.bootstrap.username=superadmin@platform.com
superadmin.bootstrap.password=ChangeMe123!

# Used to build shareable referral links, e.g. {frontend-base-url}/register?ref=REF-XXXXXX
app.frontend-base-url=http://localhost:3000

# ==============================
# Manual payment (mobile money / bank transfer)
# ==============================
# Screenshots are held in memory on the ManualPayment record itself (byte[]),
# consistent with the rest of this app's in-memory design - nothing is
# written to disk, so nothing is orphaned across a restart. Keep max file
# size reasonable since it all lives in RAM.
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=3MB
spring.servlet.multipart.max-request-size=4MB

logging.level.com.example.subscription=DEBUG
